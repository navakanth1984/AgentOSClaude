<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Saga of Veera Hanuman - Page 5</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    <style>
        body { margin:0; padding:0; background:#1a1a1a; display:flex; justify-content:center; align-items:center; min-height:100vh; }
        .page {
            width:800px; height:1200px; background:#000;
            box-shadow:0 0 50px rgba(0,0,0,.5);
            position:relative; overflow:hidden;
            border:10px solid #000;
        }
        .splash-img { width:100%; height:100%; object-fit:cover; display:block; }
        .caption-overlay {
            position:absolute; bottom:90px; left:50%; transform:translateX(-50%);
            background:rgba(20,10,3,.88); border:3px solid #c9a84c;
            padding:22px 44px; max-width:640px; text-align:center;
            backdrop-filter:blur(6px);
        }
        .caption-text {
            margin:0; font-family:'Cinzel',serif; font-size:1.55rem;
            color:#fcebd2; line-height:1.65; letter-spacing:2px;
            font-style:italic;
        }
        .series-title {
            position:absolute; top:32px; left:50%; transform:translateX(-50%);
            font-family:'Cinzel',serif; font-size:1.1rem; color:#c9a84c;
            letter-spacing:5px; text-shadow:0 0 18px rgba(201,168,76,.5);
            white-space:nowrap;
        }
        .page-number { position:absolute; bottom:12px; right:20px; font-family:'Cinzel',serif; font-size:.8rem; color:#c9a84c; }
        .fin { position:absolute; bottom:55px; right:20px; font-family:'Cinzel',serif; font-size:.75rem; color:#c9a84c; letter-spacing:3px; }
    </style>
</head>
<body>
    <div class="page">
        <img src="assets/page5_splash.png" alt="Eternal Devotion" class="splash-img">
        <div class="series-title">SAGA OF VEERA HANUMAN</div>
        <div class="caption-overlay">
            <p class="caption-text">"I am your servant in every lifetime, my Lord Rama."</p>
        </div>
        <div class="fin">— FIN —</div>
        <div class="page-number">5</div>
    </div>
</body>
</html>
