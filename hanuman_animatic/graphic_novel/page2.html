<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saga of Veera Hanuman - Page 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Playfair Display', serif;
        }
        .page {
            width: 800px;
            height: 1200px;
            background: white;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            display: grid;
            grid-template-rows: 1fr 1fr 1fr;
            gap: 10px;
            padding: 10px;
            box-sizing: border-box;
            border: 10px solid #000;
        }
        .panel {
            position: relative;
            overflow: hidden;
            border: 4px solid #000;
        }
        .panel img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .caption-box {
            position: absolute;
            background: #fcebd2;
            border: 2px solid #000;
            padding: 10px 15px;
            z-index: 10;
            box-shadow: 5px 5px 0 rgba(0,0,0,0.2);
        }
        .caption-text {
            margin: 0;
            font-size: 1rem;
            color: #2c1e12;
            line-height: 1.3;
            font-weight: 700;
        }
        .p1-cap { top: 20px; left: 20px; max-width: 200px; }
        .p2-cap { bottom: 20px; right: 20px; max-width: 250px; }
        .p3-cap { top: 20px; left: 20px; max-width: 250px; }
        
        .page-number {
            position: absolute;
            bottom: 10px;
            right: 20px;
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            color: #000;
        }
    </style>
</head>
<body>
    <div class="page" style="position: relative;">
        <div class="panel">
            <img src="assets/page2_p1.png" alt="Hanuman Cosmos">
            <div class="caption-box p1-cap">
                <p class="caption-text">Driven by hunger, he leapt into the cosmos...</p>
            </div>
        </div>
        <div class="panel">
            <img src="assets/page2_p2.png" alt="Indra Vajra">
            <div class="caption-box p2-cap">
                <p class="caption-text">To protect the cosmic order, Indra hurled his mighty Vajra...</p>
            </div>
        </div>
        <div class="panel">
            <img src="assets/page2_p3.png" alt="Strike">
            <div class="caption-box p3-cap">
                <p class="caption-text">...striking his jaw and sending him plummeting to the Udayagiri mountain.</p>
            </div>
        </div>
        <div class="page-number">2</div>
    </div>
</body>
</html>
