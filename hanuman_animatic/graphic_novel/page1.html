<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saga of Veera Hanuman - Page 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Playfair Display', serif;
        }
        .page {
            width: 800px;
            height: 1200px;
            background: white;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
            border: 10px solid #000;
        }
        .splash-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .caption-box {
            position: absolute;
            top: 40px;
            left: 40px;
            background: #fcebd2;
            border: 3px solid #000;
            padding: 20px;
            max-width: 300px;
            box-shadow: 10px 10px 0 rgba(0,0,0,0.2);
            z-index: 10;
        }
        .caption-text {
            margin: 0;
            font-size: 1.2rem;
            color: #2c1e12;
            line-height: 1.4;
            font-weight: 700;
        }
        .page-number {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            font-weight: bold;
        }
        .title-overlay {
            position: absolute;
            bottom: 60px;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 5;
        }
        .title-text {
            font-family: 'Cinzel', serif;
            font-size: 4rem;
            color: white;
            text-shadow: 0 5px 15px rgba(0,0,0,1), 0 0 30px rgba(255,165,0,0.5);
            margin: 0;
            letter-spacing: 5px;
        }
    </style>
</head>
<body>
    <div class="page">
        <img src="assets/page1_splash.png" alt="Hanuman Leap" class="splash-image">
        <div class="caption-box">
            <p class="caption-text">Endowed with boundless, untamed energy, the young Hanuman once gazed at the sky and mistook the blazing sun for a giant, ripe fruit.</p>
        </div>
        <div class="title-overlay">
            <h1 class="title-text">VEERA HANUMAN</h1>
        </div>
        <div class="page-number">1</div>
    </div>
</body>
</html>
