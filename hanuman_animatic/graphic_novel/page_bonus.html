<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Saga of Veera Hanuman - Bonus: Lanka Burns</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    <style>
        body { margin:0; padding:0; background:#1a1a1a; display:flex; justify-content:center; align-items:center; min-height:100vh; }
        .page {
            width:1200px; height:800px; background:#000;
            box-shadow:0 0 50px rgba(0,0,0,.5);
            position:relative; overflow:hidden;
            border:10px solid #000;
        }
        .splash-img { width:100%; height:100%; object-fit:cover; display:block; }
        .caption-overlay {
            position:absolute; bottom:50px; left:50%; transform:translateX(-50%);
            background:rgba(20,5,0,.88); border:3px solid #e74c3c;
            padding:18px 40px; max-width:800px; text-align:center;
            backdrop-filter:blur(6px);
        }
        .caption-text { margin:0; font-family:'Cinzel',serif; font-size:1.4rem; color:#fcebd2; line-height:1.6; letter-spacing:2px; }
        .chapter-label {
            position:absolute; top:28px; left:50%; transform:translateX(-50%);
            font-family:'Cinzel',serif; font-size:1rem; color:#e74c3c;
            letter-spacing:5px; text-shadow:0 0 18px rgba(231,76,60,.6);
            white-space:nowrap;
        }
    </style>
</head>
<body>
    <div class="page">
        <img src="assets/page_bonus_lanka.png" alt="Lanka Burns" class="splash-img">
        <div class="chapter-label">BONUS · THE INFERNO OF LANKA</div>
        <div class="caption-overlay">
            <p class="caption-text">His blazing tail transformed the magnificent city of gold into a fiery inferno.</p>
        </div>
    </div>
</body>
</html>
