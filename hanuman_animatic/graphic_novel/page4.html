<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Saga of Veera Hanuman - Page 4</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    <style>
        body { margin:0; padding:0; background:#1a1a1a; display:flex; justify-content:center; align-items:center; min-height:100vh; }
        .page {
            width:800px; height:1200px; background:#fff;
            box-shadow:0 0 50px rgba(0,0,0,.5);
            display:grid; grid-template-rows:1fr 1fr;
            gap:10px; padding:10px; box-sizing:border-box;
            border:10px solid #000; position:relative;
        }
        .panel { position:relative; overflow:hidden; border:4px solid #000; }
        .panel img { width:100%; height:100%; object-fit:cover; display:block; }
        .caption-box {
            position:absolute; background:#fcebd2; border:2px solid #000;
            padding:12px 18px; z-index:10; box-shadow:5px 5px 0 rgba(0,0,0,.2);
        }
        .caption-text { margin:0; font-family:'Playfair Display',serif; font-size:1rem; color:#2c1e12; line-height:1.4; font-weight:700; }
        .p1-cap { top:15px; left:15px; max-width:320px; }
        .p2-cap { bottom:15px; right:15px; max-width:320px; }
        .page-number { position:absolute; bottom:8px; right:18px; font-family:'Cinzel',serif; font-size:.75rem; color:#000; }
    </style>
</head>
<body>
    <div class="page">
        <div class="panel">
            <img src="assets/page4_p1.png" alt="Kishkindha">
            <div class="caption-box p1-cap">
                <p class="caption-text">Years later, the wise and mighty Hanuman served as trusted minister to the exiled Vanara prince Sugriva at Kishkindha.</p>
            </div>
        </div>
        <div class="panel">
            <img src="assets/page4_p2.png" alt="Pampa Lake">
            <div class="caption-box p2-cap">
                <p class="caption-text">Destiny unfolded when the radiant princes Rama and Lakshmana arrived at the lotus-filled shores of Pampa lake.</p>
            </div>
        </div>
        <div class="page-number">4</div>
    </div>
</body>
</html>
