<template id="slide-7-template">
  <div data-composition-id="slide-7" data-width="1920" data-height="1080" data-start="0" data-duration="10">
    <div class="scene-content">
      <h2 class="title">THE EVALUATION FUNNEL</h2>
      
      <div class="cards-container">
        <div class="card" id="c1">
          <div class="card-inner">
            <div class="card-front">
              <img src="../assets/image7.png" class="card-img p1" alt="Linting">
              <div class="label">LINTING</div>
            </div>
          </div>
        </div>
        
        <div class="card" id="c2">
          <div class="card-inner">
            <div class="card-front">
              <img src="../assets/image7.png" class="card-img p2" alt="Comprehension">
              <div class="label">COMPREHENSION</div>
            </div>
          </div>
        </div>
        
        <div class="card" id="c3">
          <div class="card-inner">
            <div class="card-front">
              <img src="../assets/image7.png" class="card-img p3" alt="LLM-as-Judge">
              <div class="label">LLM-AS-JUDGE</div>
            </div>
          </div>
        </div>
        
        <div class="card" id="c4">
          <div class="card-inner">
            <div class="card-front">
              <img src="../assets/image7.png" class="card-img p4" alt="Sandbox">
              <div class="label">SANDBOX</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <style>
      [data-composition-id="slide-7"] {
        width: 100%;
        height: 100%;
        background: #0A0A0A;
      }
      .scene-content {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 60px;
        box-sizing: border-box;
      }
      .title {
        font-family: 'Outfit', sans-serif;
        font-size: 54px;
        color: #FFFFFF;
        letter-spacing: 4px;
        margin-bottom: 60px;
        opacity: 0;
      }
      .cards-container {
        display: flex;
        gap: 20px;
        width: 100%;
        max-width: 1600px;
      }
      .card {
        flex: 1;
        height: 600px;
        perspective: 1000px;
        opacity: 0;
        transform: translateY(40px);
      }
      .card-inner {
        position: relative;
        width: 100%;
        height: 100%;
        transition: transform 0.6s;
        transform-style: preserve-3d;
      }
      .card-front {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        border: 1px solid rgba(0, 229, 255, 0.3);
        background: rgba(0, 229, 255, 0.05);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .card-img {
        width: 400%; /* Show specific section of the combined image */
        height: 100%;
        object-fit: cover;
      }
      .p1 { object-position: 0% center; }
      .p2 { object-position: 33.33% center; }
      .p3 { object-position: 66.66% center; }
      .p4 { object-position: 100% center; }
      
      .label {
        position: absolute;
        bottom: 0;
        width: 100%;
        background: rgba(0, 229, 255, 0.2);
        color: #00E5FF;
        font-family: 'JetBrains Mono', monospace;
        font-weight: 700;
        font-size: 20px;
        padding: 15px 0;
        text-align: center;
        backdrop-filter: blur(10px);
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function() {
        const tl = gsap.timeline({ paused: true });
        
        tl.to(".title", { opacity: 1, y: 0, duration: 1 }, 0.5);
        
        const cards = ["#c1", "#c2", "#c3", "#c4"];
        cards.forEach((c, i) => {
          const startTime = 1.2 + (i * 0.3);
          tl.to(c, { 
            opacity: 1, 
            y: 0, 
            duration: 0.8, 
            ease: "power3.out" 
          }, startTime);
          
          tl.from(c + " .card-inner", {
            rotationY: -90,
            duration: 1,
            ease: "expo.out"
          }, startTime + 0.2);
        });

        window.__timelines = window.__timelines || {};
        window.__timelines["slide-7"] = tl;
      })();
    </script>
  </div>
</template>
