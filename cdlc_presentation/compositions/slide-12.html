<template id="slide-12-template">
  <div data-composition-id="slide-12" data-width="1920" data-height="1080" data-start="0" data-duration="10">
    <div class="scene-content">
      <h2 class="title">AUTONOMOUS PRODUCTION RIG</h2>
      
      <div class="main-viz">
        <img src="../assets/image12.png" class="viz-img" alt="Production Rig">
        
        <!-- Rotating Gears -->
        <div class="gear-spinner"></div>
        
        <!-- Malicious Injection -->
        <div class="malicious-bolt"></div>
        <div class="waf-line"></div>
        <div class="sparks-container"></div>
      </div>

      <div class="features-grid">
        <div class="feature f1">REAL-TIME CONTEXT FILTERING</div>
        <div class="feature f2">AUTO-GENERATIVE TEST CASES</div>
        <div class="feature f3">LLM FIREWALL (WAF)</div>
      </div>
    </div>

    <style>
      [data-composition-id="slide-12"] {
        width: 100%;
        height: 100%;
        background: #0A0A0A;
      }
      .scene-content {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 60px;
        box-sizing: border-box;
      }
      .title {
        font-family: 'Outfit', sans-serif;
        font-size: 54px;
        color: #FFFFFF;
        margin-bottom: 40px;
        opacity: 0;
      }
      .main-viz {
        position: relative;
        width: 1200px;
        height: 600px;
        opacity: 0;
      }
      .viz-img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      
      .malicious-bolt {
        position: absolute;
        bottom: -50px;
        left: 45%;
        width: 4px;
        height: 150px;
        background: #FF4444;
        box-shadow: 0 0 20px #FF4444;
        opacity: 0;
        transform-origin: bottom;
      }
      
      .waf-line {
        position: absolute;
        bottom: 250px;
        left: 10%;
        width: 80%;
        height: 4px;
        background: #FF9100;
        box-shadow: 0 0 20px #FF9100;
        opacity: 0;
      }

      .features-grid {
        margin-top: 60px;
        display: flex;
        gap: 40px;
      }
      .feature {
        font-family: 'JetBrains Mono', monospace;
        color: #B0B0B0;
        font-size: 18px;
        padding: 15px 30px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        opacity: 0;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function() {
        const tl = gsap.timeline({ paused: true });
        
        tl.to(".title", { opacity: 1, y: 0, duration: 1 }, 0.5);
        tl.to(".main-viz", { opacity: 1, duration: 1.2 }, 1);
        tl.to(".waf-line", { opacity: 1, scaleX: 1, duration: 0.8 }, 1.5);
        
        // Injection sequence
        tl.to(".malicious-bolt", { 
          opacity: 1, 
          y: -100, 
          duration: 0.4, 
          ease: "power2.in" 
        }, 2.5);
        
        tl.to(".malicious-bolt", { 
          opacity: 0, 
          scaleY: 0, 
          duration: 0.2 
        }, 2.9);
        
        // Features reveal
        [".f1", ".f2", ".f3"].forEach((f, i) => {
          tl.to(f, { 
            opacity: 1, 
            borderColor: "#FF9100", 
            color: "#FFFFFF", 
            duration: 0.6 
          }, 3.5 + (i * 0.3));
        });

        window.__timelines = window.__timelines || {};
        window.__timelines["slide-12"] = tl;
      })();
    </script>
  </div>
</template>
