    <style>
      [data-composition-id="slide-5"] {
        width: 100%;
        height: 100%;
        background: #0A0A0A;
      }
      .scene-content {
        width: 100%;
        height: 100%;

        flex-direction: column;

        justify-content: center;
        padding: 60px;

      .step-num {

        color: #00E5FF;
        font-size: 24px;

      }

        font-size: 48px;
        color: #FFFFFF;
        margin-bottom: 40px;

        opacity: 0;
      }

        tl.to(".agentmd-glow", { opacity: 1, scale: 1.2, duration: 1, ease: "back.out(2)" }, 2.5);
        tl.to(".info-card", { 
          opacity: 1, 
          x: 0, 
          duration: 0.8 
        }, 2);

        window.__timelines = window.__timelines || {};
        window.__timelines["slide-5"] = tl;
