<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dead Loop - Official Trailer</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <style>
        :root {
            --orange: #E67E22;
            --midnight: #2C3E50;
            --cyan: #00FFFF;
            --golden: #F39C12;
            --bg: #050505;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: white;
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
        }

        #trailer-root {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .shot {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            z-index: 1;
        }

        .hud-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            border: 20px solid transparent;
            box-sizing: border-box;
        }

        .hud-scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(0, 255, 255, 0.1);
            box-shadow: 0 0 10px var(--cyan);
            z-index: 11;
        }

        .caption-container {
            position: absolute;
            bottom: 10%;
            width: 100%;
            text-align: center;
            z-index: 20;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        .caption-text {
            font-size: 2.5rem;
            opacity: 0;
            display: inline-block;
        }

        .arjun-text { color: var(--golden); }
        .veda-text { color: var(--cyan); }

        .status-box {
            position: absolute;
            top: 40px;
            right: 40px;
            padding: 15px;
            border: 1px solid var(--orange);
            background: rgba(230, 126, 34, 0.1);
            font-size: 0.8rem;
            color: var(--orange);
            z-index: 15;
        }

        .glitch-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('media/shot_01.png');
            background-size: cover;
            mix-blend-mode: overlay;
            opacity: 0;
            z-index: 5;
        }
    </style>
</head>
<body>

<div id="trailer-root" data-composition-id="dead-loop-trailer" 
    data-width="1920" data-height="1080"
    data-duration="150"
    data-fps="30"
    data-start="0">
    <audio id="arjun_01" src="arjun_01.wav" data-vocal="true" data-start="2" data-duration="1.44" data-track-index="10"></audio>
    <audio id="veda_01" src="veda_01.wav" data-vocal="true" data-start="22" data-duration="2.39" data-track-index="10"></audio>
    <audio id="arjun_02" src="arjun_02.wav" data-vocal="true" data-start="30" data-duration="2.14" data-track-index="10"></audio>
    <audio id="veda_02" src="veda_02.wav" data-vocal="true" data-start="48" data-duration="2.5" data-track-index="10"></audio>
    <audio id="arjun_03" src="arjun_03.wav" data-vocal="true" data-start="60" data-duration="3" data-track-index="10"></audio>
    <audio id="veda_03" src="veda_03.wav" data-vocal="true" data-start="80" data-duration="2.8" data-track-index="10"></audio>
    <audio id="veda_04" src="veda_04.wav" data-vocal="true" data-start="140" data-duration="2" data-track-index="10"></audio>

    <!-- SHOTS -->
    <img id="shot-01" class="shot clip" src="media/shot_01.png" data-start="0" data-duration="5" data-track-index="1">
    <img id="shot-02" class="shot clip" src="media/shot_02.png" data-start="5" data-duration="5" data-track-index="1">
    <img id="shot-03" class="shot clip" src="media/shot_03.png" data-start="10" data-duration="5" data-track-index="1">
    <img id="shot-04" class="shot clip" src="media/shot_04.png" data-start="15" data-duration="5" data-track-index="1">
    <img id="shot-05" class="shot clip" src="media/shot_05.png" data-start="20" data-duration="5" data-track-index="1">
    <img id="shot-06" class="shot clip" src="media/shot_06.png" data-start="25" data-duration="5" data-track-index="1">
    <img id="shot-07" class="shot clip" src="media/shot_07.png" data-start="30" data-duration="7" data-track-index="1">
    <img id="shot-08" class="shot clip" src="media/shot_08.png" data-start="37" data-duration="8" data-track-index="1">
    <img id="shot-09" class="shot clip" src="media/shot_09.png" data-start="45" data-duration="5" data-track-index="1">
    <img id="shot-10" class="shot clip" src="media/shot_10.png" data-start="50" data-duration="5" data-track-index="1">
    <img id="shot-11" class="shot clip" src="media/shot_11.png" data-start="55" data-duration="5" data-track-index="1">
    <img id="shot-12" class="shot clip" src="media/shot_12.png" data-start="60" data-duration="10" data-track-index="1">

    <!-- HUD -->
    <div class="hud-overlay">
        <div class="hud-scanline" id="scanline"></div>
        <div class="status-box" id="status-veda">
            SYSTEM: ACTIVE<br>
            VEDA_CORE: CONNECTED<br>
            LOC: HITECCITY_IND
        </div>
    </div>

    <!-- CAPTIONS -->
    <div class="caption-container">
        <div id="dynamic-caption" class="caption-text"></div>
    </div>
</div>

<script>
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({ paused: true });

    const hud = document.querySelector(".hud-overlay");
    const captions = document.getElementById("dynamic-caption");

    // INITIAL STATE
    tl.set(".shot", { opacity: 0 });

    // SHOT 01
    tl.to("#shot-01", { opacity: 1, duration: 1 }, 0);
    tl.from("#shot-01", { scale: 1.2, duration: 5, ease: "none" }, 0);
    tl.to("#shot-01", { opacity: 0, duration: 0.5 }, 4.5);

    // SHOT 02
    tl.to("#shot-02", { opacity: 1, duration: 1 }, 5);
    tl.from("#shot-02", { x: -50, duration: 5, ease: "power1.inOut" }, 5);
    tl.to("#shot-02", { opacity: 0, duration: 0.5 }, 9.5);

    // SHOT 03
    tl.to("#shot-03", { opacity: 1, duration: 1 }, 10);
    tl.from("#shot-03", { scale: 1.1, duration: 5, ease: "none" }, 10);
    tl.to("#shot-03", { opacity: 0, duration: 0.5 }, 14.5);

    // SHOT 04
    tl.to("#shot-04", { opacity: 1, duration: 1 }, 15);
    tl.from("#shot-04", { scale: 1.1, duration: 5, ease: "none" }, 15);
    tl.to("#shot-04", { opacity: 0, duration: 0.5 }, 19.5);

    // SHOT 05
    tl.to("#shot-05", { opacity: 1, duration: 1 }, 20);
    tl.from("#shot-05", { filter: "brightness(0)", duration: 2 }, 20);
    tl.to("#shot-05", { opacity: 0, duration: 0.5 }, 24.5);

    // SHOT 06
    tl.to("#shot-06", { opacity: 1, duration: 1 }, 25);
    tl.from("#shot-06", { y: 30, opacity: 0, duration: 1.5 }, 25);
    tl.to("#shot-06", { opacity: 0, duration: 0.5 }, 29.5);

    // SHOT 07
    tl.to("#shot-07", { opacity: 1, duration: 0.5 }, 30);
    tl.from("#shot-07", { scale: 1.5, filter: "blur(10px)", duration: 0.5 }, 30);
    tl.to("#shot-07", { opacity: 0, duration: 0.5 }, 36.5);

    // SHOT 08
    tl.to("#shot-08", { opacity: 1, duration: 0.1 }, 37);
    tl.from("#shot-08", { x: 100, duration: 1, ease: "power4.out" }, 37);
    tl.to("#shot-08", { opacity: 0, duration: 0.5 }, 44.5);

    // DIALOGUE SYNC (Captions only, Audio is managed via data attributes)
    tl.to(hud, { opacity: 1, duration: 1 }, 0);
    
    tl.set(captions, { textContent: "ARJUN: How can I trust you?", className: "caption-text arjun-text", opacity: 1 }, 2);
    tl.set(captions, { opacity: 0 }, 2 + 1.44);

    tl.set(captions, { textContent: "VEDA: I made mistakes. I am still learning.", className: "caption-text veda-text", opacity: 1 }, 22);
    tl.set(captions, { opacity: 0 }, 22 + 2.39);

    tl.set(captions, { textContent: "ARJUN: How can you learn while lives are lost?", className: "caption-text arjun-text", opacity: 1 }, 30);
    tl.set(captions, { opacity: 0 }, 30 + 2.14);

    // Veda 02: "I want to protect you. I will protect you."
    tl.set(captions, { textContent: "VEDA: I want to protect you. I will protect you.", className: "caption-text veda-text", opacity: 1 }, 48);
    tl.set(captions, { opacity: 0 }, 48 + 2.5);

    // SHOT 09
    tl.to("#shot-09", { opacity: 1, duration: 1 }, 45);
    tl.from("#shot-09", { scale: 1.5, duration: 5, ease: "none" }, 45);
    tl.to("#shot-09", { opacity: 0, duration: 0.5 }, 49.5);

    // SHOT 10
    tl.to("#shot-10", { opacity: 1, duration: 1 }, 50);
    tl.from("#shot-10", { x: 50, duration: 5, ease: "power1.inOut" }, 50);
    tl.to("#shot-10", { opacity: 0, duration: 0.5 }, 54.5);

    // SHOT 11
    tl.to("#shot-11", { opacity: 1, duration: 1 }, 55);
    tl.from("#shot-11", { y: 100, duration: 5, ease: "power2.out" }, 55);
    tl.to("#shot-11", { opacity: 0, duration: 0.5 }, 59.5);

    // SHOT 12
    tl.to("#shot-12", { opacity: 1, duration: 1 }, 60);
    tl.from("#shot-12", { scale: 1.1, x: -100, duration: 10, ease: "none" }, 60);
    tl.to("#shot-12", { opacity: 0, duration: 1 }, 69);

    // DATA GLITCH (Shot 07)
    tl.to(hud, { skewX: 20, duration: 0.1, repeat: 10, yoyo: true, ease: "none" }, 30);

    // Global HUD Animation
    tl.to("#scanline", { 
        top: "100%", 
        duration: 4, 
        repeat: 4, 
        ease: "none" 
    }, 0);

    tl.to("#status-veda", {
        opacity: 0.5,
        duration: 0.2,
        repeat: 100,
        yoyo: true,
        ease: "steps(1)"
    }, 0);

    window.__timelines["dead-loop-trailer"] = tl;
</script>

</body>
</html>
