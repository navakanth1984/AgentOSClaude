<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Puli Meka: The Metal Avatar - Full Story</title>
  <style>
    :root {
      --primary-dark: #020406;
      --led-cyan: #00f3ff;
      --amber-haze: #ffbf00;
      --font-mono: 'JetBrains Mono', monospace;
    }
    body, html { margin: 0; padding: 0; background: var(--primary-dark); overflow: hidden; width: 1920px; height: 1080px; }
    
    #viewport { 
      width: 1920px; height: 1080px; position: relative; 
      background: black;
    }

    .scene { 
      position: absolute; width: 100%; height: 100%; 
      display: none; opacity: 0; overflow: hidden;
    }
    .scene.active { display: block; opacity: 1; }

    img {
      width: 100%; height: 100%; object-fit: cover; position: absolute;
    }

    /* UI Metadata */
    .metadata {
      position: absolute; top: 60px; left: 60px; z-index: 1000;
      font-family: var(--font-mono); font-size: 18px; color: var(--led-cyan);
      text-transform: uppercase; letter-spacing: 0.3em; opacity: 0.8;
      text-shadow: 0 0 15px var(--led-cyan);
    }

    .energy-shield {
      position: absolute; top: 50%; left: 50%;
      width: 800px; height: 800px; border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 243, 255, 0.1) 0%, transparent 70%);
      border: 2px solid var(--led-cyan); box-shadow: 0 0 100px var(--led-cyan);
      opacity: 0; z-index: 500;
      transform: translate(-50%, -50%);
    }

    .overlay-fx {
      position: absolute; width: 100%; height: 100%; z-index: 50;
      pointer-events: none; mix-blend-mode: screen;
    }

    /* Luminous Canisters */
    .luminous-canister {
      position: absolute; width: 4px; height: 40px;
      background: white; box-shadow: 0 0 20px white;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div id="viewport" data-composition-id="puli-meka-full" data-width="1920" data-height="1080" data-start="0" data-duration="40">
    <div class="metadata" id="global-meta">SYSTEM_INITIALIZED // ZONE_4</div>

    <!-- Scene 1: The Monolith (0-5s) -->
    <div id="s1" class="scene clip active" data-start="0" data-duration="5">
      <img src="scene1_plate.jpg" alt="Rust-Minar establishing shot">
    </div>

    <!-- Scene 2: Awakening (5-10s) -->
    <div id="s2" class="scene clip" data-start="5" data-duration="5">
      <img src="scene2_plate.jpg" alt="Kalki eyes snap open">
      <div class="overlay-fx" id="awakening-glow" style="background: radial-gradient(circle, var(--led-cyan) 0%, transparent 60%); opacity: 0;"></div>
    </div>

    <!-- Scene 3: Bazaar Encounter (10-15s) -->
    <div id="s3" class="scene clip" data-start="10" data-duration="5">
      <img src="scene3_plate.jpg" alt="Bazaar encounter">
    </div>

    <!-- Scene 4: The Shield (15-20s) -->
    <div id="s4" class="scene clip" data-start="15" data-duration="5">
      <img src="scene4_plate.jpg" alt="Technician projecting energy shield">
      <div class="energy-shield" id="main-shield"></div>
      <div id="falling-sparks"></div>
    </div>

    <!-- Scene 5: The Overseer (20-25s) -->
    <div id="s5" class="scene clip" data-start="20" data-duration="5">
      <img src="scene5_plate.jpg" alt="Vector the Overseer">
      <div style="position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%); font-family: var(--font-mono); font-size: 120px; color: var(--led-cyan); text-shadow: 0 0 40px var(--led-cyan); opacity: 0;" id="chip-counter">10,000,000</div>
    </div>

    <!-- Scene 6: The Revival (25-30s) -->
    <div id="s6" class="scene clip" data-start="25" data-duration="5">
      <img src="scene6_plate.jpg" alt="Energy link transfer">
      <svg viewBox="0 0 1920 1080" style="position: absolute; width: 100%; height: 100%; z-index: 100;">
        <path id="energy-path" d="M400,800 Q960,300 1520,800" fill="none" stroke="transparent" />
        <circle id="energy-blob" r="12" fill="#fff" style="filter: drop-shadow(0 0 15px #00f3ff); opacity: 0;">
          <animateMotion dur="0.6s" repeatCount="indefinite">
            <mpath href="#energy-path" />
          </animateMotion>
        </circle>
      </svg>
    </div>

    <!-- Scene 7: The Ascent (30-35s) -->
    <div id="s7" class="scene clip" data-start="30" data-duration="5">
      <img src="scene7_plate.jpg" alt="Scaling the vertical conduits">
    </div>

    <!-- Scene 8: Finale (35-40s) -->
    <div id="s8" class="scene clip" data-start="35" data-duration="5">
      <img src="scene8_plate.jpg" alt="Kalki looking at the orbital station">
      <div style="position: absolute; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, transparent 0%, black 100%);"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({ paused: true });

    function createPRNG(seed) {
      return function() {
        seed = (seed * 16807) % 2147483647;
        return (seed - 1) / 2147483646;
      };
    }
    const prng = createPRNG(999);

    const dur = 5;
    const scenes = ['s1', 's2', 's3', 's4', 's5', 's6', 's7', 's8'];

    scenes.forEach((id, i) => {
      const start = i * dur;
      
      // Scene Entrance
      tl.to(`#${id}`, { opacity: 1, duration: 1, ease: "power2.inOut" }, start);
      tl.from(`#${id} img`, { scale: 1.15, duration: dur, ease: "sine.inOut" }, start);
      
      // Scene-specific FX
      if (id === 's2') {
        tl.to("#awakening-glow", { opacity: 0.5, duration: 0.8, repeat: 3, yoyo: true, ease: "power2.inOut" }, start + 0.5);
        tl.set("#global-meta", { innerText: "BIO_SCAN // IDENTITY: KALKI" }, start);
      }
      if (id === 's4') {
        tl.to("#main-shield", { opacity: 1, scale: 1.2, duration: 0.5, ease: "back.out(1.5)" }, start + 0.5);
        const sparkContainer = document.getElementById('falling-sparks');
        for(let j=0; j<20; j++) {
          const s = document.createElement('div');
          s.className = 'luminous-canister';
          s.style.left = (10 + prng() * 80) + '%';
          s.style.top = '-60px';
          sparkContainer.appendChild(s);
          tl.to(s, { y: 1200, x: '+=100', duration: 1, repeat: 4, ease: "none" }, start + prng() * 2);
        }
      }
      if (id === 's5') {
        tl.to("#chip-counter", { opacity: 0.8, scale: 1, duration: 2, ease: "expo.out" }, start + 1);
        tl.set("#global-meta", { innerText: "DATA_NODE // ACCESS_DENIED" }, start);
      }
      if (id === 's6') {
        tl.to("#energy-blob", { opacity: 1, duration: 0.5 }, start + 0.5);
        tl.set("#global-meta", { innerText: "SYSTEM_SYNC // RESTORATION_78%" }, start);
      }
      if (id === 's7') {
        tl.set("#global-meta", { innerText: "ORBITAL_TETHER // ASCENT_ACTIVE" }, start);
      }
      if (id === 's8') {
        tl.to("#viewport", { filter: "brightness(0)", duration: 2.5 }, start + 2.5);
        tl.set("#global-meta", { innerText: "TERMINAL_STATE // DESTINY_REACHED" }, start);
      }

      // Exit logic
      if (i < scenes.length - 1) {
        tl.set(`#${id}`, { display: "none" }, start + dur);
        tl.set(`#${scenes[i+1]}`, { display: "block" }, start + dur);
      }
    });

    window.__timelines["puli-meka-full"] = tl;
  </script>
</body>
</html>
