name: CI

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps (speech parse path — offline, no ML models)
        run: |
          python -m pip install --upgrade pip
          pip install pytest pydantic google-genai python-dotenv

      - name: Compile-check speech subsystem
        run: python -m compileall -q agent_os/speech

      - name: Parse-stage tests (deterministic, offline mock)
        env:
          PYTHONPATH: .
        run: pytest test_parse_stage.py -q
