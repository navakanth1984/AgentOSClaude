<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>DP-700 Microsoft Fabric Certification Guide</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000;
        font-family: 'Outfit', sans-serif;
        color: #fff;
      }

      .scene {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }

      .bg-img {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -1;
      }

      .overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.8));
        z-index: 0;
      }

      .content {
        position: relative;
        z-index: 10;
        text-align: center;
        width: 80%;
      }

      h1 {
        font-size: 110px;
        font-weight: 700;
        margin-bottom: 20px;
        text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        background: linear-gradient(135deg, #fff 0%, #0078d4 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      p {
        font-size: 48px;
        font-weight: 300;
        color: rgba(255,255,255,0.9);
        letter-spacing: 2px;
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 60px 100px;
        border-radius: 40px;
        box-shadow: 0 40px 100px rgba(0,0,0,0.5);
      }

      .footer {
        position: absolute;
        bottom: 60px;
        font-size: 24px;
        opacity: 0.6;
        text-transform: uppercase;
        letter-spacing: 4px;
      }

      /* Transitions */
      .char { display: inline-block; }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="58.14"
      data-width="1920"
      data-height="1080"
    >
      <!-- Audio Track -->
      <audio data-track-index="0" src="dp700_speech.wav"></audio>

      <!-- Scene 1: Introduction -->
      <div id="scene1" class="scene clip" data-start="0" data-duration="30">
        <img src="media/scene1.png" class="bg-img" id="bg1">
        <div class="overlay"></div>
        <div class="glass-card" id="card1">
            <h1 id="title1">Master Microsoft Fabric</h1>
            <p id="sub1">DP-700 Certification Guide</p>
        </div>
        <div class="footer">Deep Dive into Data Analytics</div>
      </div>

      <!-- Scene 2: Certification -->
      <div id="scene2" class="scene clip" data-start="29" data-duration="29.14">
        <img src="media/scene2.png" class="bg-img" id="bg2">
        <div class="overlay"></div>
        <div class="glass-card" id="card2">
            <h1 id="title2">Get Certified</h1>
            <p id="sub2">Become a Data Engineer Associate</p>
        </div>
        <div class="footer">Your Career Roadmap 2026</div>
      </div>

    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Scene 1 Animations (0-30s)
      tl.to("#scene1", { opacity: 1, duration: 1 }, 0);
      tl.fromTo("#bg1", { scale: 1.1 }, { scale: 1, duration: 30, ease: "none" }, 0);
      tl.from("#card1", { y: 100, opacity: 0, duration: 2, ease: "power4.out" }, 0.5);
      tl.from("#title1", { opacity: 0, y: 30, duration: 1.5, ease: "power2.out" }, 1);
      tl.from("#sub1", { opacity: 0, y: 20, duration: 1.5, ease: "power2.out" }, 1.5);

      // Scene 2 Animations (29-58.14s)
      tl.to("#scene1", { opacity: 0, duration: 2 }, 29);
      tl.set("#scene1", { visibility: "hidden" }, 31); // Kill Scene 1 visibility
      tl.to("#scene2", { opacity: 1, duration: 2 }, 29);
      tl.fromTo("#bg2", { scale: 1 }, { scale: 1.1, duration: 30, ease: "none" }, 29);
      tl.from("#card2", { scale: 0.8, opacity: 0, duration: 2, ease: "back.out(1.7)" }, 30);
      tl.from("#title2", { opacity: 0, x: -50, duration: 1.5, ease: "power2.out" }, 30.5);
      tl.from("#sub2", { opacity: 0, x: 50, duration: 1.5, ease: "power2.out" }, 31);

      // Fade out at end
      tl.to("#root", { opacity: 0, duration: 2 }, 56);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
